<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Composiciones Musicales Leonardo Loyola</title>

<meta property="og:type" content="website">
<meta property="og:title" content="PPlayList Jose Voluntarista(Pepe)">
<meta property="og:description" content="PlayList Jose Voluntarista(Pepe)">
<meta property="og:image" content="https://lucksys.github.io/videos/jose/portada.jpg">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="PlayList Jose Voluntarista(Pepe)">
<meta name="twitter:image" content="https://lucksys.github.io/videos/jose/portada.jpg">

<style>
:root {
--gold:#d4af37;
--bg:rgba(0,0,0,.92);
--panel:rgba(10,10,10,.78);
--card:#111;
--text:#f3e7b3;
}
*{box-sizing:border-box;}
body{
margin:0;
font-family:Georgia,serif;
background:url("portada.jpg") no-repeat center fixed;
background-size:cover;
color:var(--gold);
}
.overlay{background:var(--bg);min-height:100vh;padding:20px;}
h1{text-align:center;text-shadow:0 0 15px var(--gold);}
.container{display:flex;gap:20px;flex-wrap:wrap;}
.column{flex:1;min-width:320px;border:1px solid var(--gold);padding:15px;border-radius:12px;background:var(--panel);}
.grid{display:grid;gap:25px;}
.card{position:relative;background:var(--card);border:1px solid var(--gold);border-radius:12px;overflow:hidden;}
.card:hover{box-shadow:0 0 20px var(--gold);}
.card img{width:100%;background:#000;}

.card-title{
padding:10px 90px 10px 12px;
text-align:left;
color:var(--text);
line-height:1.2;
word-break:break-word;
}

.info-btn{
position:absolute;
top:8px;
right:8px;
width:38px;
height:32px;
background:#000;
color:var(--gold);
border:1px solid var(--gold);
font-size:13px;
}

.song-btn{
position:absolute;
top:44px;
right:8px;
height:32px;
background:#000;
color:var(--gold);
border:1px solid var(--gold);
padding:0 6px;
font-size:13px;
cursor:pointer;
}

.info-overlay{
position:fixed;
inset:0;
background:#000a;
display:none;
align-items:center;
justify-content:center;
}
.info-overlay.active{display:flex;}

.info-popup{
position:relative;
background:#111;
padding:20px;
border:1px solid var(--gold);
max-width:500px;
width:90%;
}

.info-close{
position:absolute;
top:10px;
right:10px;
background:#000;
color:var(--gold);
border:1px solid var(--gold);
cursor:pointer;
}
</style>
</head>

<body>

<div class="overlay">
<h1>Composiciones Musicales Leonardo J. Loyola</h1>

<div class="container">
<div class="column">
<h2>Playlist</h2>
<div id="videos" class="grid">
<div class="loading">Cargando...</div>
</div>
</div>

<div class="column">
<h2>Videos</h2>
<div class="grid">
<p>Proximamente...</p>
</div>
</div>
</div>
</div>

<div id="infoOverlay" class="info-overlay">
<div class="info-popup">
<button id="infoClose" class="info-close">X</button>
<h3 id="infoTitulo"></h3>
<p id="infoTexto"></p>
</div>
</div>

<script>
(function(){

const contenedor = document.getElementById("videos");
const infoOverlay = document.getElementById("infoOverlay");
const infoTitulo = document.getElementById("infoTitulo");
const infoTexto = document.getElementById("infoTexto");

document.getElementById("infoClose").onclick=()=>infoOverlay.classList.remove("active");

function abrirInfo(titulo,texto){
infoTitulo.textContent=titulo;
infoTexto.textContent=texto;
infoOverlay.classList.add("active");
}

function getValue(line){
const m=line.match(/:\s*"?([^"]+)/);
return m?m[1].trim():null;
}

function parseBloque(lineas){

let indice=null;
let titulo="";
let imagen=null;
let video=null;
let cancion=null;
let info=[];

for(let i=0;i<lineas.length;i++){

let l=lineas[i];

if(i===0){
let m=l.match(/^\s*(\d+)\s*-\s*(.+)/);
if(m){
indice=parseInt(m[1]);
titulo=m[2].replaceAll("_"," ").trim();
}
}

if(/^url-imagen/i.test(l)) imagen=getValue(l);
if(/^url-video/i.test(l)) video=getValue(l);
if(/^url-cancion/i.test(l)) cancion=getValue(l);

if(/^info/i.test(l)){
let txt = l.replace(/^info\s*:/i,"").replace(/^\s*"+/, "").trim();

info.push(txt);

for(let j=i+1;j<lineas.length;j++){
info.push(
lineas[j]
.replace(/^"+/, "")
.replace(/"+$/, "")
.trim()
);
}
break;
}

}

if(!imagen||!video||!cancion) return null;

return{
indice,
titulo,
imagen,
video,
cancion,
info:info.join("\n")
.replace(/-{3,}/g,"")
.trim()
};

}

async function cargar(){

try{

const res=await fetch("./Lista_de_Enlaces_de_Videos.txt");
if(!res.ok) throw new Error("TXT no encontrado");

const txt=await res.text();

const bloques = txt.split(/\n(?=\s*\d+\s*-\s*)/);

contenedor.innerHTML="";

let total=0;

for(const b of bloques){

const lineas=b.split("\n").map(l=>l.trim()).filter(Boolean);

const d=parseBloque(lineas);

if(!d || d.indice === null || d.indice === 0) continue;

const card=document.createElement("div");
card.className="card";

const titulo=document.createElement("div");
titulo.className="card-title";
titulo.textContent=d.indice+" - "+d.titulo;

const img=document.createElement("img");
img.src=d.imagen;
img.onerror=function(){this.onerror=null;this.src="portada.jpg";};
img.onclick=()=>window.open(d.video,"_blank");

const infoBtn=document.createElement("button");
infoBtn.className="info-btn";
infoBtn.textContent="Info";
infoBtn.onclick=(e)=>{e.stopPropagation();abrirInfo(d.titulo,d.info);};

const btnCancion=document.createElement("button");
btnCancion.className="song-btn";
btnCancion.textContent="Solo canción";
btnCancion.onclick=(e)=>{e.stopPropagation();window.open(d.cancion,"_blank");};

card.appendChild(btnCancion);
card.appendChild(infoBtn);
card.appendChild(titulo);
card.appendChild(img);

contenedor.appendChild(card);

total++;

}

if(total===0){
contenedor.innerHTML="No se encontraron obras";
}

}catch(e){
contenedor.innerHTML="Error cargando la lista";
console.error(e);
}

}

cargar();

})();
</script>

</body>
</html>
